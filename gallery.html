<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Parametric Markdown — Diagram Gallery</title>

  <style>
    html, body { height: auto !important; overflow: visible !important; }
    body { margin: 0; display: block !important; }

    .g-header {
      background: var(--code-bg);
      color: var(--code-ink);
      padding: 2.25rem 2.5rem 1.75rem;
      border-bottom: 3px solid var(--accent);
    }
    .g-header h1 { margin: 0 0 0.3rem; font-size: 1.65rem; font-weight: 700; letter-spacing: -0.01em; }
    .g-header p  { margin: 0; opacity: 0.6; font-size: 0.9rem; }
    .g-header a  { color: var(--accent); text-decoration: none; }
    .g-header a:hover { text-decoration: underline; }

    .g-nav {
      display: flex; gap: 0.5rem;
      padding: 0.85rem 2.5rem;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      position: sticky; top: 0; z-index: 20;
      flex-wrap: wrap;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    .g-nav a {
      padding: 0.35rem 0.9rem; border-radius: 999px; text-decoration: none;
      font-size: 0.82rem; font-weight: 600;
      background: var(--bg); color: var(--muted); border: 1px solid var(--line);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .g-nav a:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .g-nav .nav-sep { flex: 1; }
    .g-nav .nav-home { font-size: 0.82rem; font-weight: 500; color: var(--muted); text-decoration: none; }
    .g-nav .nav-home:hover { color: var(--accent); }

    .g-main { padding: 2rem 2.5rem 4rem; max-width: 1440px; margin: 0 auto; }

    .g-section { margin-bottom: 4rem; scroll-margin-top: 4rem; }
    .g-section-head { margin-bottom: 1.5rem; }
    .g-section-head h2 { margin: 0 0 0.2rem; font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 0.6rem; }
    .section-icon { width: 28px; height: 28px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .g-section-head p { margin: 0; font-size: 0.875rem; color: var(--muted); padding-left: 34px; }

    .g-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(580px, 1fr)); gap: 1.5rem; }

    .g-card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
    .g-card-head { display: flex; align-items: center; gap: 0.6rem; padding: 0.7rem 1rem; background: var(--bg); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
    .diff-badge { font-size: 0.68rem; font-weight: 700; padding: 0.18rem 0.5rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; }
    .diff-easy     { background: #dcfce7; color: #15803d; }
    .diff-medium   { background: #fef3c7; color: #92400e; }
    .diff-complex  { background: #fee2e2; color: #b91c1c; }
    .diff-advanced { background: #ede9fe; color: #6d28d9; }
    .g-card-title { font-weight: 600; font-size: 0.9rem; color: var(--ink); }
    .g-card-desc  { font-size: 0.78rem; color: var(--muted); margin-left: auto; }

    .g-card-body .diagram-card { border: none !important; box-shadow: none !important; border-radius: 0 !important; margin: 0 !important; }

    /* Pan/zoom canvas */
    .g-card-body .diagram-canvas {
      padding: 0;
      position: relative;
      overflow: hidden;
      height: 360px;
      cursor: grab;
      user-select: none;
      background: var(--bg);
      border-top: 1px solid var(--line);
    }
    .g-card-body .diagram-canvas.is-dragging { cursor: grabbing; }
    .g-card-body .diagram-canvas svg {
      display: block;
      max-width: none !important;
      height: auto !important;
      transform-origin: 0 0;
      will-change: transform;
    }

    /* Zoom control buttons (Google Maps style) */
    .zoom-controls {
      position: absolute;
      bottom: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 10;
    }
    .zoom-btn {
      width: 30px; height: 30px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s;
    }
    .zoom-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .zoom-btn.zoom-reset { font-size: 11px; font-weight: 700; }

    /* Gallery is a showcase — suppress diagnostic noise from expected single-use label warnings */
    .g-card-body .diagnostics { display: none !important; }
    .g-card-body .diagram-error-badge { display: none !important; }

    .g-loading { padding: 3rem 2rem; text-align: center; color: var(--muted); font-size: 0.9rem; }
    .g-loading-spinner { width: 28px; height: 28px; border: 3px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 760px) {
      .g-header { padding: 1.5rem 1rem 1.25rem; }
      .g-nav    { padding: 0.75rem 1rem; }
      .g-main   { padding: 1rem 1rem 3rem; }
      .g-grid   { grid-template-columns: 1fr; }
    }
  </style>
</head>

/* ── Helpers ─────────────────────────────────────────────────────────────── */
function diffClass(d) {
  return { easy: "diff-easy", medium: "diff-medium", complex: "diff-complex", advanced: "diff-advanced" }[d] || "diff-easy";
}

/* ── Pan / Zoom ──────────────────────────────────────────────────────────── */
function makeZoomable(host, exId) {
  const canvas = host.querySelector('.diagram-canvas');
  if (!canvas) return;
  const svg = canvas.querySelector('svg');
  if (!svg) return;

  let scale = 1, tx = 0, ty = 0;
  let dragging = false, startX = 0, startY = 0, startTx = 0, startTy = 0;

  function applyTransform() {
    svg.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  }

  function zoomAt(factor, cx, cy) {
    const next = Math.max(0.15, Math.min(10, scale * factor));
    const r = next / scale;
    tx = cx - r * (cx - tx);
    ty = cy - r * (cy - ty);
    scale = next;
    applyTransform();
  }

  function fitToCanvas() {
    const svgW = svg.viewBox.baseVal.width  || svg.getBBox().width  || canvas.clientWidth;
    const svgH = svg.viewBox.baseVal.height || svg.getBBox().height || 360;
    const cW = canvas.clientWidth, cH = canvas.clientHeight;
    scale = Math.min(cW / svgW, cH / svgH, 1);
    tx = (cW - svgW * scale) / 2;
    ty = (cH - svgH * scale) / 2;
    applyTransform();
  }

  // Fit on first render
  requestAnimationFrame(fitToCanvas);

  // Zoom control buttons
  const controls = document.createElement('div');
  controls.className = 'zoom-controls';
  controls.innerHTML =
    `<button class="zoom-btn" title="Zoom in"  data-z="in">+</button>` +
    `<button class="zoom-btn zoom-reset" title="Fit diagram" data-z="fit">FIT</button>` +
    `<button class="zoom-btn" title="Zoom out" data-z="out">−</button>`;
  canvas.appendChild(controls);

  controls.addEventListener('click', e => {
    const btn = e.target.closest('[data-z]');
    if (!btn) return;
    const cW = canvas.clientWidth, cH = canvas.clientHeight;
    if (btn.dataset.z === 'in')  zoomAt(1.3, cW / 2, cH / 2);
    if (btn.dataset.z === 'out') zoomAt(1 / 1.3, cW / 2, cH / 2);
    if (btn.dataset.z === 'fit') fitToCanvas();
  });

  // Wheel zoom centred on cursor
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    zoomAt(e.deltaY < 0 ? 1.1 : 1 / 1.1, e.clientX - rect.left, e.clientY - rect.top);
  }, { passive: false });

  // Mouse-drag pan
  canvas.addEventListener('mousedown', e => {
    if (e.target.closest('.zoom-controls')) return;
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    startTx = tx; startTy = ty;
    canvas.classList.add('is-dragging');
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    tx = startTx + (e.clientX - startX);
    ty = startTy + (e.clientY - startY);
    applyTransform();
  });
  window.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; canvas.classList.remove('is-dragging'); }
  });
}

/* ── Diagnostic console logging ─────────────────────────────────────────── */
function logDiagramErrors(host, exId) {
  const diagEl = host.querySelector('.diagnostics');
  if (!diagEl) return;
  const items = [...diagEl.querySelectorAll('*')]
    .filter(el => el.children.length === 0 && el.textContent.trim())
    .map(el => el.textContent.trim());
  if (!items.length) return;
  console.group(`%c[gallery:#${exId}] ${items.length} diagnostic(s)`, 'color:#f59e0b;font-weight:700');
  items.forEach(msg => {
    if (/error/i.test(msg)) console.error(msg);
    else console.warn(msg);
  });
  console.groupEnd();
}

function loadKiCadLibraries(libraryNames) {
  const catalog = window.KICAD_SYMBOL_CATALOG;
  if (!catalog?.libraries) return Promise.resolve();
  return Promise.all([...new Set(libraryNames)].map((lib) => {
    if (!catalog.libraries[lib]) return Promise.resolve();
    if (catalog.loadedLibraries?.[lib] === true) return Promise.resolve();
    return new Promise((resolve) => {
      const s = document.createElement("script");
      s.src = catalog.libraries[lib].file;
      s.onload = s.onerror = resolve;
      document.head.appendChild(s);
    });
  }));
}

function renderExample(ex, host) {
  const result = window.SchematicMarkdown.renderMarkdownCircuits(ex.markdown, host);
  logDiagramErrors(host, ex.id);
  makeZoomable(host, ex.id);
  if (result.missingLibraries && result.missingLibraries.length) {
    loadKiCadLibraries(result.missingLibraries).then(() => {
      window.SchematicMarkdown.renderMarkdownCircuits(ex.markdown, host);
      makeZoomable(host, ex.id);
    });
  }
}

function buildGallery() {
  const gallery = document.getElementById("gallery");

  gallery.innerHTML = Object.values(EXAMPLES).map((cat) => {
    const cards = cat.examples.map((ex) => `
      <article class="g-card" id="${ex.id}">
        <div class="g-card-head">
          <span class="diff-badge ${diffClass(ex.difficulty)}">${ex.difficulty}</span>
          <span class="g-card-title">${ex.title}</span>
          <span class="g-card-desc">${ex.desc}</span>
        </div>
        <div class="g-card-body" data-ex-id="${ex.id}"></div>
      </article>`).join("");

    return `<section class="g-section" id="${cat.id}">
      <div class="g-section-head">
        <h2>
          <span class="section-icon" style="background:${cat.iconBg}">${cat.icon}</span>
          ${cat.title}
        </h2>
        <p>${cat.desc}</p>
      </div>
      <div class="g-grid">${cards}</div>
    </section>`;
  }).join("");

  Object.values(EXAMPLES).forEach((cat) => {
    cat.examples.forEach((ex) => {
      const host = gallery.querySelector(`[data-ex-id="${ex.id}"]`);
      if (host) renderExample(ex, host);
    });
  });
}

document.addEventListener("DOMContentLoaded", buildGallery);
</script>
